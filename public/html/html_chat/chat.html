<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babysite - Conversar com a Babá</title>
    <link rel="icon" type="image/x-icon" href="../../css/logo_do_babysite.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../../css/chat/chat.css">
</head>
<body class="bg-light">
    <header class="navbar bg-babysite shadow-sm py-2 px-4">
        <div class="container-fluid d-flex align-items-center">
            <a href="../html_home/home.html" class="navbar-brand d-flex align-items-center text-white text-decoration-none">
                <img src="../../css/logo_do_babysite.ico" alt="Logo Babysite" width="45" height="45" class="rounded-circle border border-2 border-white" style="border-color: rgb(119, 0, 255) !important; box-shadow: 0 0 10px rgba(119, 0, 255, 0.25);">
                <h1 class="h5 mb-0 ms-2">Babysite</h1>
            </a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <span id="chat-auth-status" class="small text-white"></span>
                <span id="chat-connection-status" class="small text-white">Conectando...</span>
                <button id="chat-login-btn" class="btn btn-outline-light btn-sm">Entrar</button>
            </div>
        </div>
    </header>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="chat-card shadow-sm rounded-4 overflow-hidden">
                    <div class="chat-topbar d-flex align-items-center gap-3 px-4 py-3">
                        <img id="chat-baba-avatar" src="../../img/placeholder.png" alt="Avatar da babá" class="chat-top-avatar">
                        <div>
                            <h2 id="chat-baba-name" class="h6 mb-1">Conversa com Babá</h2>
                            <p id="chat-baba-status" class="text-muted small mb-0">Online</p>
                        </div>
                    </div>
                    <div id="chat-area" class="chat-area bg-white p-3">
                        <div id="chat-messages" class="chat-messages"></div>
                    </div>
                    <div class="chat-input-bar p-3 bg-light border-top">
                        <div id="chat-info" class="text-center text-muted small mb-2 d-none"></div>
                        <div class="d-flex gap-2 align-items-center">
                            <input id="chat-input" type="text" class="form-control" placeholder="Digite sua mensagem..." autocomplete="off" disabled>
                            <button id="chat-send" class="btn btn-primary" type="button" disabled>Enviar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/services/auth.js"></script>
    <script src="../../js/chat/chat.js"></script>
</body>
</html>
